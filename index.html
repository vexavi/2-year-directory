<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>2nd Year Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-a: #07111f;
      --bg-b: #10243d;
      --card: rgba(255,255,255,0.10);
      --card-strong: rgba(255,255,255,0.16);
      --stroke: rgba(255,255,255,0.18);
      --text: #f4f8ff;
      --muted: #b8c7dd;
      --blue: #56c7ff;
      --green: #8cffc1;
      --yellow: #ffe28a;
      --pink: #ff86d1;
      --shadow: rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(86,199,255,0.26), transparent 34%),
        radial-gradient(circle at 82% 16%, rgba(140,255,193,0.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,134,209,0.16), transparent 34%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: 0.42;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 34px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06)),
        rgba(3, 10, 20, 0.38);
      box-shadow: 0 24px 70px var(--shadow);
      padding: 28px;
      margin-bottom: 18px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      right: -130px;
      top: -130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(86,199,255,0.36), transparent 64%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 16px rgba(140,255,193,0.8);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 16px 0 0;
      font-size: clamp(2.2rem, 8vw, 5.2rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      display: flex;
      min-height: 145px;
      align-items: flex-end;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: 24px;
      background:
        linear-gradient(135deg, var(--card-strong), var(--card)),
        rgba(5, 12, 24, 0.44);
      box-shadow: 0 18px 45px rgba(0,0,0,0.24);
      padding: 20px;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.9;
      background:
        radial-gradient(circle at 15% 18%, var(--glow), transparent 36%),
        linear-gradient(135deg, rgba(255,255,255,0.12), transparent 58%);
      pointer-events: none;
    }

    .card::after {
      content: "OPEN";
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.82);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.14em;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.36);
      box-shadow: 0 24px 70px rgba(0,0,0,0.34);
      outline: none;
    }

    .card-title {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.35rem, 4vw, 2.1rem);
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .icon {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      border-radius: 16px;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
      font-size: 1.45rem;
    }

    .rpg { --glow: rgba(255,226,138,0.34); }
    .match { --glow: rgba(86,199,255,0.36); }
    .flash { --glow: rgba(255,134,209,0.32); }
    .writing { --glow: rgba(140,255,193,0.34); }

    footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(244,248,255,0.56);
      font-size: 0.78rem;
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 24px, 980px);
        padding-top: 20px;
      }

      .hero {
        padding: 22px;
        border-radius: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 118px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Page title">
      <div class="eyebrow"><span class="dot" aria-hidden="true"></span>Practice Directory</div>
      <h1>2nd Year Practice</h1>
    </section>

    <section class="grid" aria-label="Practice links">
      <a class="card match" href="https://quizlet.com/1179356261/match" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">⚡</span>Match Game</span>
      </a>

      <a class="card flash" href="https://quizlet.com/1179356261/flashcards" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">🃏</span>Flash Card</span>
      </a>

      <a class="card writing" href="https://vexavi.github.io/2nenseiwritingdrill/" target="_blank" rel="noopener noreferrer">
        <span class="card-title"><span class="icon" aria-hidden="true">✍️</span>Writing Practice</span>
      </a>
    </section>

    <footer>&copy; 2026 2nd Year Practice</footer>
  </main>
</body>
</html>
